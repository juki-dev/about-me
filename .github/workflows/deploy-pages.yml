name: Deploy to GitHub Pages (dev)

# Dev-review deploys: every push to the working branch publishes the
# portfolio to GitHub Pages at https://juki-dev.github.io/about-me/.
on:
  push:
    branches: ['re-born']
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
        env:
          # Project sites live under /<repo>/ — must match the repo name.
          BASE_PATH: /about-me/

      - name: Add SPA fallback
        # GitHub Pages has no server-side routing; serving the built
        # index.html as 404.html lets deep links (e.g. /projects/<slug>)
        # boot the Vue app instead of a hard 404.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
